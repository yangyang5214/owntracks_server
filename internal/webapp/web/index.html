<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
  <title>·</title>
  <link rel="stylesheet" href="/style.css" />
</head>
<body>

  <div class="pin-overlay" id="pin-overlay">
    <div class="pin-card">
      <p class="pin-hint">请输入 4 位访问密码</p>
      <div class="pin-digits" id="pin-digits">
        <input type="text" inputmode="numeric" maxlength="1" class="pin-digit" autocomplete="off" />
        <input type="text" inputmode="numeric" maxlength="1" class="pin-digit" autocomplete="off" />
        <input type="text" inputmode="numeric" maxlength="1" class="pin-digit" autocomplete="off" />
        <input type="text" inputmode="numeric" maxlength="1" class="pin-digit" autocomplete="off" />
      </div>
      <p class="pin-error" id="pin-error"></p>
    </div>
  </div>

  <div id="map"></div>
  <div class="map-error hidden" id="map-error" role="alert"></div>

  <div class="panel panel-controls" id="controls-panel">
    <button class="btn active" id="btn-corner" title="点亮区县（adcode 由服务端入库时逆地理写入；前端仅查边界）">
      <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M3 3h8v8H3V3zm10 0h8v8h-8V3zM3 13h8v8H3v-8zm10 0h8v8h-8v-8z"/></svg>
    </button>
    <div class="btn-divider"></div>
    <button class="btn" id="btn-zin" title="放大">
      <svg viewBox="0 0 24 24"><path d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6z"/></svg>
    </button>
    <button class="btn" id="btn-zout" title="缩小">
      <svg viewBox="0 0 24 24"><path d="M19 13H5v-2h14z"/></svg>
    </button>
  </div>

  <div class="attribution">地图数据 © <a href="https://lbs.amap.com" target="_blank" rel="noreferrer">高德地图</a></div>

  <script src="/app.js"></script>
</body>
</html>
